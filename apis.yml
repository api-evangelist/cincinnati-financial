aid: cincinnati-financial
name: Cincinnati Financial
description: >-
  Cincinnati Financial Corporation (NASDAQ: CINF) is a property and casualty
  insurer headquartered in Fairfield, Ohio, that markets a full suite of
  business, home, auto, and life insurance products plus investment services
  exclusively through a network of independent insurance agencies. Cincinnati
  Financial does not currently operate a public developer portal or expose
  customer-facing APIs; agency, claims, and policyholder access is delivered
  through web portals (cinfin.com, onlineservice.cinfin.com, and the Cincinnati
  Insurance Mobile App), with technical integrations for appointed agencies
  handled directly by Cincinnati Insurance IT support.
